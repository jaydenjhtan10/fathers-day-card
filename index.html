<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Father's Day!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f2fe; /* Light blue background */
            font-family: 'Poppins', sans-serif; /* Applied Poppins here */
            margin: 0;
        }
        
        .card {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px); /* Adds a little float effect when hovering */
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-top: 0;
            font-size: 2.5em;
            font-weight: 800; /* Extra bold for heading */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        p {
            font-size: 1.15em;
            font-weight: 400; /* Clean weight for paragraph text */
            line-height: 1.6;
            margin: 20px 0;
        }

        .heart {
            color: #ef4444; /* Red heart */
            font-size: 1.3em;
        }

        .signature {
            margin-top: 30px;
            font-size: 1.1em;
            font-weight: 600; /* Semi-bold signature */
            font-style: italic;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Happy Father'
