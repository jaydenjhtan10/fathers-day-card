<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Father's Day!</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f2fe; /* Light blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        
        .card {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px); /* Adds a little float effect when hovering */
        }

        h1 {
            margin-top: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin: 20px 0;
        }

        .heart {
            color: #ef4444; /* Red heart */
            font-size: 1.5em;
        }

        .signature {
            margin-top: 30px;
            font-size: 1.1em;
            font-style: italic;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Happy Father's Day!</h1>
        <p>Thanks for teaching me everything I know... except how to stop spending your money.</p>
        <p>You're the absolute best! <span class="heart">❤️</span></p>
        <p class="signature">Love,<br>Jayden</p>
    </div>

</body>
</html>
